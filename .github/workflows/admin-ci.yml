name: Admin Panel - CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'zubaco-admin-panel-repo/**'
  pull_request:
    branches: [main]
    paths:
      - 'zubaco-admin-panel-repo/**'

env:
  AWS_REGION: ap-south-1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Admin Backend
        working-directory: zubaco-admin-panel-repo/zubaco-admin-panel/backend
        run: |
          npm ci --legacy-peer-deps
          npx prisma generate
          npx tsc --noEmit

      - name: Build Admin Frontend
        working-directory: zubaco-admin-panel-repo/zubaco-admin-panel/frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy Admin Backend
        working-directory: zubaco-admin-panel-repo/zubaco-admin-panel/backend
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/zubaco-admin-backend:${{ github.sha }} .
          docker push ${{ steps.login-ecr.outputs.registry }}/zubaco-admin-backend:${{ github.sha }}
          aws ecs update-service --cluster zubaco-production --service admin-backend --force-new-deployment

      - name: Deploy Admin Frontend
        working-directory: zubaco-admin-panel-repo/zubaco-admin-panel/frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build
          aws s3 sync out/ s3://zubaco-admin-cdn/ --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.ADMIN_CF_DISTRIBUTION_ID }} --paths "/*"
