apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zubaco-backend-policy
  namespace: zubaco
spec:
  podSelector:
    matchLabels:
      platform: zubaco
      tier: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - port: 3000
          protocol: TCP
    # Allow Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - port: 3000
          protocol: TCP
  egress:
    # Allow PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP
    # Allow Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
          protocol: TCP
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: zubaco-backend-pdb
  namespace: zubaco
spec:
  minAvailable: 1
  selector:
    matchLabels:
      platform: zubaco
      tier: backend
