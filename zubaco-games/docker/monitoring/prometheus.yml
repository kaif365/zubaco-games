global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerting-rules.yml

scrape_configs:
  - job_name: 'zubaco-backends'
    metrics_path: /api/v1/metrics
    static_configs:
      - targets:
          - colour-sorting-backend:3006
          - flash-spot-backend:3001
          - object-placement-backend:3004
          - rapid-sort-backend:3008
          - true-false-blitz-backend:3010
          - word-unscramble-backend:3012
          - number-grid-backend:3014
          - live-route-backend:3016
          - memory-groups-backend:3018
          - reflex-endurance-backend:3020
          - pattern-survival-backend:3022
          - speed-type-backend:3024
          - sequence-recall-backend:3026
          - memory-card-matching-backend:3028
          - sliding-puzzle-backend:3030
          - block-fill-backend:3032
          - maze-navigation-backend:3034
          - infinity-loop-backend:3036
          - arrows-backend:3038
          - logic-reflector-backend:3040
        labels:
          environment: 'local'
