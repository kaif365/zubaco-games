upstream flash_spot { server flash-spot-backend:3000; }
upstream colour_sorting { server colour-sorting-backend:3000; }
upstream object_placement { server object-placement-memory-backend:3000; }
upstream rapid_sort { server rapid-sort-backend:3000; }
upstream true_false_blitz { server true-false-blitz-backend:3000; }
upstream word_unscramble { server word-unscramble-backend:3000; }
upstream number_grid { server number-grid-backend:3000; }
upstream live_route { server live-route-backend:3000; }
upstream memory_groups { server memory-groups-backend:3000; }
upstream reflex_endurance { server reflex-endurance-backend:3000; }
upstream pattern_survival { server pattern-survival-backend:3000; }
upstream speed_type { server speed-type-backend:3000; }
upstream sequence_recall { server sequence-recall-backend:3000; }
upstream memory_card_matching { server memory-card-matching-backend:3000; }
upstream sliding_puzzle { server sliding-puzzle-backend:3000; }
upstream block_fill { server block-fill-backend:3000; }
upstream maze_navigation { server maze-navigation-backend:3000; }
upstream infinity_loop { server infinity-loop-backend:3000; }
upstream arrows { server arrows-backend:3000; }
upstream logic_reflector { server logic-reflector-backend:3000; }

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Request size limit
    client_max_body_size 10m;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # WebSocket timeout (long-lived connections)
    map $http_upgrade $proxy_read_timeout_ws {
        default 30s;
        websocket 3600s;
    }

    # Common proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ─── Game API Routes ───
    location /api/flash-spot/ { proxy_pass http://flash_spot/api/; }
    location /api/colour-sorting/ { proxy_pass http://colour_sorting/api/; }
    location /api/object-placement/ { proxy_pass http://object_placement/api/; }
    location /api/rapid-sort/ { proxy_pass http://rapid_sort/api/; }
    location /api/true-false-blitz/ { proxy_pass http://true_false_blitz/api/; }
    location /api/word-unscramble/ { proxy_pass http://word_unscramble/api/; }
    location /api/number-grid/ { proxy_pass http://number_grid/api/; }
    location /api/live-route/ { proxy_pass http://live_route/api/; }
    location /api/memory-groups/ { proxy_pass http://memory_groups/api/; }
    location /api/reflex-endurance/ { proxy_pass http://reflex_endurance/api/; }
    location /api/pattern-survival/ { proxy_pass http://pattern_survival/api/; }
    location /api/speed-type/ { proxy_pass http://speed_type/api/; }
    location /api/sequence-recall/ { proxy_pass http://sequence_recall/api/; }
    location /api/memory-card-matching/ { proxy_pass http://memory_card_matching/api/; }
    location /api/sliding-puzzle/ { proxy_pass http://sliding_puzzle/api/; }
    location /api/block-fill/ { proxy_pass http://block_fill/api/; }
    location /api/maze-navigation/ { proxy_pass http://maze_navigation/api/; }
    location /api/infinity-loop/ { proxy_pass http://infinity_loop/api/; }
    location /api/arrows/ { proxy_pass http://arrows/api/; }
    location /api/logic-reflector/ { proxy_pass http://logic_reflector/api/; }

    # ─── WebSocket Routes (Socket.IO) ───
    location /ws/flash-spot/ {
        proxy_pass http://flash_spot/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
    location /ws/colour-sorting/ {
        proxy_pass http://colour_sorting/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
    location /ws/object-placement/ {
