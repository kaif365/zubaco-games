    }

    # ─── Health Checks ───
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ─── Prometheus Metrics (internal) ───
    location /nginx-status {
        stub_status on;
        allow 172.16.0.0/12;
        deny all;
    }
}
