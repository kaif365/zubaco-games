      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        GAME_DIR: Infinity-loop/infinity-loop-frontend
        VITE_API_BASE_URL: http://localhost:3036/api/v1
    ports:
      - "3035:80"
    depends_on:
      - infinity-loop-backend
    networks:
      - zubaco-net
    profiles: ["all", "infinity-loop"]

  arrows-backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        GAME_DIR: arrows/arrows-backend
    environment:
      PORT: "3038"
      DATABASE_URL: postgresql://zubaco:${POSTGRES_PASSWORD:-zubaco_dev_2024}@postgres:5432/arrows
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      CORS_ORIGINS: http://localhost:3037
      NODE_ENV: production
      REDIS_HOST: redis
    ports:
      - "3038:3038"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zubaco-net
    profiles: ["all", "arrows"]

  arrows-frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        GAME_DIR: arrows/arrows-frontend
        VITE_API_BASE_URL: http://localhost:3038/api/v1
    ports:
      - "3037:80"
    depends_on:
      - arrows-backend
    networks:
      - zubaco-net
    profiles: ["all", "arrows"]

  logic-reflector-backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        GAME_DIR: logic-reflector/logic-reflector-backend
    environment:
      PORT: "3040"
      DATABASE_URL: postgresql://zubaco:${POSTGRES_PASSWORD:-zubaco_dev_2024}@postgres:5432/logic_reflector
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      CORS_ORIGINS: http://localhost:3039
      NODE_ENV: production
      REDIS_HOST: redis
    ports:
      - "3040:3040"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zubaco-net
    profiles: ["all", "logic-reflector"]

  logic-reflector-frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        GAME_DIR: logic-reflector/logic-reflector-frontend
        VITE_API_BASE_URL: http://localhost:3040/api/v1
    ports:
      - "3039:80"
    depends_on:
      - logic-reflector-backend
    networks:
      - zubaco-net
    profiles: ["all", "logic-reflector"]

  # ─── API Gateway ───
  gateway:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/gateway.nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/proxy_params:/etc/nginx/proxy_params:ro
    depends_on:
      - redis
    networks:
      - zubaco-net
    profiles: ["all", "gateway"]

  # ─── Monitoring ───
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/monitoring/alerting-rules.yml:/etc/prometheus/alerting-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - zubaco-net
    profiles: ["all", "monitoring"]

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - zubaco-net
    profiles: ["all", "monitoring"]

volumes:
  pgdata:
  prometheus_data:
  grafana_data:

networks:
  zubaco-net:
    driver: bridge
