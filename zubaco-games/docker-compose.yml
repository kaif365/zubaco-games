# ╔══════════════════════════════════════════════════════════════╗
# ║  Zubaco Games – Docker Compose (Local Development)         ║
# ╚══════════════════════════════════════════════════════════════╝
#
# Usage:
#   docker compose up -d            # start everything
#   docker compose up postgres      # only DB
#   docker compose --profile all up # all games
#
# Ports: PostgreSQL 5432, each game pair uses sequential ports

services:
  # ─── Shared Infrastructure ───
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zubaco
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zubaco_dev_2024}
      POSTGRES_DB: zubaco
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zubaco"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - zubaco-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - zubaco-net

  # ─── Game Backends ───
  colour-sorting-backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        GAME_DIR: colour-sorting/colour-sorting-backend
    environment:
      PORT: "3006"
      DATABASE_URL: postgresql://zubaco:${POSTGRES_PASSWORD:-zubaco_dev_2024}@postgres:5432/colour_sorting
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      CORS_ORIGINS: http://localhost:3005
      NODE_ENV: production
      REDIS_HOST: redis
    ports:
      - "3006:3006"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zubaco-net
    profiles: ["all", "colour-sorting"]

  colour-sorting-frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        GAME_DIR: colour-sorting/colour-sorting-frontend
        VITE_API_BASE_URL: http://localhost:3006/api/v1
    ports:
      - "3005:80"
    depends_on:
      - colour-sorting-backend
    networks:
      - zubaco-net
    profiles: ["all", "colour-sorting"]

