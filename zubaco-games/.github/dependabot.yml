# Dependabot – Automated dependency updates
# https://docs.github.com/en/code-security/dependabot

version: 2

updates:
  # ─── GitHub Actions ───
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"

  # ─── Root monorepo (husky, lint-staged, prettier) ───
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5

  # ─── Docker base images ───
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "wednesday"
    commit-message:
      prefix: "docker"
    labels:
      - "dependencies"
      - "docker"
