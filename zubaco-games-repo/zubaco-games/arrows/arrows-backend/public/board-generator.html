<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Arrows — Board Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #topbar {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }

    .topbar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
    }
    .topbar-row + .topbar-row { border-top: 1px solid #21262d; }

    .url-label {
      font-size: 11px; color: #484f58;
      white-space: nowrap; text-transform: uppercase; letter-spacing: 0.5px;
    }

    input[type="text"], input[type="email"], input[type="password"], input[type="number"] {
      background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
      border-radius: 5px; padding: 6px 10px;
      font-family: monospace; font-size: 13px; outline: none; flex: 1;
    }
    input:focus { border-color: #58a6ff; }

    button {
      padding: 6px 14px; border-radius: 5px; border: none;
      cursor: pointer; font-family: monospace; font-size: 13px; font-weight: bold;
      white-space: nowrap;
    }
    button:disabled { opacity: 0.4; cursor: default; }

    #btn-get-token  { background: #6e40c9; color: #fff; }
    #btn-generate   { background: #1f6feb; color: #fff; }
    #btn-solve      { background: #238636; color: #fff; }
    #btn-solve.solving { background: #f85149; }

    .cell.autoplay-flash { outline: 3px solid #3fb950 !important; background: #0d2e1a !important; transition: outline 0.15s, background 0.15s; }

    /* MAIN */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* GAME AREA */
    #game-area {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; overflow: auto; background: #0d1117;
    }

    #board-info { margin-bottom: 12px; font-size: 12px; color: #8b949e; text-align: center; }
    #status-msg { margin-bottom: 8px; font-size: 13px; color: #58a6ff; font-weight: bold; text-align: center; min-height: 20px; }

    #grid { display: grid; gap: 3px; user-select: none; }

    .cell {
      width: 52px; height: 52px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      background: #21262d; position: relative;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .cell.empty { }
    .cell.arrow-cell { cursor: pointer; }
    .cell.arrow-cell:hover { filter: brightness(1.25); }

    .cell.flash-remove { animation: flash-remove 0.35s ease forwards; }
    @keyframes flash-remove {
      0%   { transform: scale(1);    opacity: 1; }
      60%  { transform: scale(1.12); opacity: 0.6; }
      100% { transform: scale(0);    opacity: 0; }
    }

    .cell.flash-fail { animation: flash-red 0.5s ease forwards; }
    @keyframes flash-red {
      0%   { box-shadow: 0 0 0 0 rgba(248,81,73,0); }
      30%  { box-shadow: 0 0 0 8px rgba(248,81,73,0.7); background: rgba(248,81,73,0.35); }
      100% { box-shadow: 0 0 0 0 rgba(248,81,73,0); }
    }

    #empty-msg { color: #484f58; font-size: 14px; }

    /* SIDEBAR */
    #sidebar { width: 340px; min-width: 280px; border-left: 1px solid #30363d; display: flex; flex-direction: column; background: #161b22; }
    #sidebar-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #30363d; font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
    #btn-clear-log { background: #21262d; color: #8b949e; border: 1px solid #30363d; font-size: 11px; padding: 3px 8px; }
    #log { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 5px; }

    .log-entry { font-size: 11px; padding: 6px 8px; border-radius: 4px; border-left: 3px solid transparent; white-space: pre-wrap; word-break: break-all; line-height: 1.5; }
    .log-entry.out  { border-color: #1f6feb; background: #0d2040; }
    .log-entry.in   { border-color: #3fb950; background: #0d2e1a; }
    .log-entry.err  { border-color: #f85149; background: #2d0d0d; }
    .log-entry.info { border-color: #8b949e; background: #1c2128; }
    .log-entry .lt  { color: #484f58; font-size: 10px; display: block; margin-bottom: 2px; }
    .log-entry .ev  { font-weight: bold; color: #c9d1d9; }
    .log-entry .body { color: #8b949e; }

    #token-status {
      font-size: 11px; color: #3fb950; display: none;
    }
    #token-status.err { color: #f85149; display: inline; }
    #token-status.ok  { color: #3fb950; display: inline; }
  </style>
</head>
<body>

<div id="topbar">
  <!-- Row 1: Arrows URL + Admin URL -->
  <div class="topbar-row">
    <span class="url-label">Arrows</span>
    <input id="arrows-url" type="text" placeholder="http://localhost:3000" style="flex:1" />
    <span class="url-label">Admin</span>
    <input id="admin-url" type="text" placeholder="http://localhost:4000" style="flex:1" />
  </div>

  <!-- Row 2: Admin credentials + get token -->
  <div class="topbar-row">
    <span class="url-label">Email</span>
    <input id="admin-email" type="email" placeholder="admin@example.com" style="flex:1" />
    <span class="url-label">Password</span>
    <input id="admin-password" type="password" placeholder="••••••••" style="flex:1" />
    <button id="btn-get-token">Get Admin Token</button>
    <span id="token-status"></span>
  </div>

  <!-- Row 3: Grid size + generate + solve -->
  <div class="topbar-row">
    <span class="url-label">Grid X</span>
    <input id="grid-x" type="number" min="2" max="50" value="6" style="width:70px;flex:none" />
    <span class="url-label">Grid Y</span>
    <input id="grid-y" type="number" min="2" max="50" value="6" style="width:70px;flex:none" />
    <button id="btn-generate">Generate Board</button>
    <button id="btn-solve" disabled>Solve</button>
    <span class="url-label">Interval (ms)</span>
    <input id="solve-interval" type="number" min="10" value="120" style="width:70px;flex:none" />
    <span id="solve-step" style="font-size:12px;color:#8b949e;min-width:80px"></span>
  </div>
</div>

<div id="main">
  <div id="game-area">
    <div id="status-msg"></div>
    <div id="board-info"></div>
    <div id="grid"></div>
    <div id="empty-msg">Configure admin credentials and generate a board</div>
  </div>

  <div id="sidebar">
    <div id="sidebar-header">Log <button id="btn-clear-log">Clear</button></div>
    <div id="log"></div>
  </div>
</div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  let adminToken  = null;
  let boardState  = null;  // { gridX, gridY, cellMap, arrowMap, remaining }
  let solving     = false;

  const DIR_SYMBOL = { up: '↑', down: '↓', left: '←', right: '→' };
  const DIR_DELTA  = { up:{dx:0,dy:1}, down:{dx:0,dy:-1}, left:{dx:-1,dy:0}, right:{dx:1,dy:0} };

  // ── Helpers ───────────────────────────────────────────────────────────────
  /**
   * Get an element by id.
   *
   * @param {string} id - id value.
   *
   * @returns {HTMLElement | null} The matching element, if found.
   */
  const $ = id => document.getElementById(id);
  /**
   * Get the current timestamp label.
   *
   * @returns {string} The formatted string.
   */
  const ts = () => new Date().toLocaleTimeString('en-GB', { hour12: false, fractionalSecondDigits: 2 });
  /**
   * Handle num to hex.
   *
   * @param {number} n - n value.
   *
   * @returns {string} The formatted string.
   */
  const numToHex = n => '#' + (n & 0xFFFFFF).toString(16).padStart(6, '0');
  /**
   * Handle darken.
   *
   * @param {string} hex - hex value.
   *
   * @returns {string} The formatted string.
   */
  const darken = hex => {
    const n = parseInt(hex.slice(1), 16);
    return '#' + [
      Math.max(0, ((n >> 16) & 0xFF) - 60),
      Math.max(0, ((n >>  8) & 0xFF) - 60),
      Math.max(0,  (n & 0xFF)        - 60),
    ].reduce((acc, v, i) => acc | (v << (16 - 8 * i)), 0).toString(16).padStart(6, '0');
  };

  /**
   * Handle log.
   *
   * @param {string} type - type value.
   * @param {string} event - event value.
   * @param {Object} data - data value.
   */
  function log(type, event, data) {
    const el = document.createElement('div');
    el.className = `log-entry ${type}`;
    const label = { out:'▲ SENT', in:'▼ RECV', err:'✖ ERR', info:'ℹ' }[type];
    const body = data !== undefined ? '\n' + JSON.stringify(data, null, 2) : '';
    el.innerHTML = `<span class="lt">${ts()}</span><span class="ev">${label}  ${event}</span><span class="body">${body}</span>`;
    const logEl = $('log');
    logEl.appendChild(el);
    logEl.scrollTop = logEl.scrollHeight;
  }

  /**
   * Handle api fetch.
   *
   * @param {string} baseUrl - base url value.
   * @param {string} method - method value.
   * @param {string} path - path value.
   * @param {Object} body - body value.
   * @param {string} token - token value.
   *
   * @returns {Promise<Object>} The parsed API response.
   */
  async function apiFetch(baseUrl, method, path, body, token) {
    const url = baseUrl.replace(/\/$/, '') + path;
    log('out', `${method} ${path}`, body ?? undefined);
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(url, {
      method,
      headers,
      body: body ? JSON.stringify(body) : undefined,
    });
    const json = await res.json();
    log('in', `${method} ${path} ← ${res.status}`, json);
    if (!res.ok) throw Object.assign(new Error(json?.message ?? 'Request failed'), { json, status: res.status });
    return json?.data ?? json;
  }

  // ── Get Admin Token ───────────────────────────────────────────────────────
  $('btn-get-token').addEventListener('click', async () => {
    const adminUrl  = $('admin-url').value.trim();
    const email     = $('admin-email').value.trim();
    const password  = $('admin-password').value.trim();
    if (!adminUrl)  { alert('Enter Admin service URL'); return; }
    if (!email)     { alert('Enter admin email'); return; }
    if (!password)  { alert('Enter admin password'); return; }

    const status = $('token-status');
    status.className = '';
    status.textContent = '';

    try {
      const data = await apiFetch(adminUrl, 'POST', '/admin/auth/login', { email, password });
      adminToken = data?.token ?? data?.accessToken ?? null;
      if (!adminToken) throw new Error('No token in response');
      status.className = 'ok';
      status.textContent = '✓ token obtained';
      log('info', 'admin token stored', { preview: adminToken.slice(0, 30) + '…' });
    } catch (err) {
      status.className = 'err';
      status.textContent = '✗ ' + err.message;
      log('err', 'login failed', { msg: err.message });
    }
  });

  // ── Generate Board ────────────────────────────────────────────────────────
  $('btn-generate').addEventListener('click', async () => {
    if (!adminToken) { alert('Get an admin token first'); return; }
    const arrowsUrl = $('arrows-url').value.trim();
    if (!arrowsUrl) { alert('Enter Arrows service URL'); return; }
    const gridX = parseInt($('grid-x').value, 10);
    const gridY = parseInt($('grid-y').value, 10);
    if (!gridX || gridX < 2 || gridX > 50) { alert('Grid X must be 2–50'); return; }
    if (!gridY || gridY < 2 || gridY > 50) { alert('Grid Y must be 2–50'); return; }

    stopSolve();
    $('btn-solve').disabled = true;
    $('status-msg').textContent = 'Generating…';
    $('empty-msg').style.display = 'none';

    try {
      const data = await apiFetch(arrowsUrl, 'POST', '/v1/boards/generate', { gridX, gridY }, adminToken);
      loadBoard(data);
      $('btn-solve').disabled = false;
      $('status-msg').textContent = `Generated ${data.arrows.length} arrows — solvable ✓  |  Click arrows to solve manually, or press Solve`;
    } catch (err) {
      $('status-msg').textContent = '✗ ' + err.message;
      log('err', 'generate failed', { msg: err.message });
    }
  });

  // ── Load & Render Board ───────────────────────────────────────────────────
  /**
   * Load board.
   *
   * @param {Object} data - data value.
   */
  function loadBoard(data) {
    const { gridSize, arrows } = data;
    const gx = gridSize.x, gy = gridSize.y;
    const cellMap = {}, arrowMap = {};

    arrows.forEach((a, i) => {
      arrowMap[i] = { ...a, removed: false };
      a.waypoints.forEach(wp => { cellMap[`${wp.x},${wp.y}`] = i; });
    });

    boardState = { gx, gy, cellMap, arrowMap, remaining: arrows.length, total: arrows.length };
    $('board-info').textContent = `Grid ${gx}×${gy}  |  ${arrows.length} arrows`;
    $('solve-step').textContent = '';
    renderBoard();
  }

  /**
   * Render board.
   */
  function renderBoard() {
    const { gx, gy, cellMap, arrowMap } = boardState;
    const grid = $('grid');
    grid.style.gridTemplateColumns = `repeat(${gx}, 52px)`;
    grid.innerHTML = '';

    const headCells = {};
    Object.entries(arrowMap).forEach(([i, a]) => {
      if (a.removed) return;
      const wps = a.waypoints;
      if (wps.length) headCells[`${wps[wps.length-1].x},${wps[wps.length-1].y}`] = { dir: a.headDirection, idx: +i };
    });

    for (let sr = 0; sr < gy; sr++) {
      const row = gy - 1 - sr;
      for (let col = 0; col < gx; col++) {
        const key  = `${col},${row}`;
        const cell = document.createElement('div');
        cell.id = `cell-${col}-${row}`;
        cell.dataset.x = col; cell.dataset.y = row;
        const idx = cellMap[key];
        if (idx !== undefined && !arrowMap[idx].removed) {
          const a = arrowMap[idx], color = numToHex(a.color);
          cell.className = 'cell arrow-cell';
          cell.style.background = darken(color);
          cell.style.border = `2px solid ${color}`;
          if (headCells[key]) {
            cell.textContent = DIR_SYMBOL[headCells[key].dir] ?? '?';
            cell.style.color = color; cell.style.fontSize = '22px'; cell.style.fontWeight = 'bold';
          } else {
            cell.innerHTML = `<div style="width:10px;height:10px;border-radius:50%;background:${color};opacity:0.8"></div>`;
          }
          cell.addEventListener('click', onCellClick);
        } else {
          cell.className = 'cell empty';
        }
        grid.appendChild(cell);
      }
    }
  }

  // ── Manual cell click ─────────────────────────────────────────────────────
  /**
   * Handle on cell click.
   *
   * @param {Event} e - e value.
   */
  function onCellClick(e) {
    if (!boardState || solving) return;
    const x = +e.currentTarget.dataset.x, y = +e.currentTarget.dataset.y;
    const idx = boardState.cellMap[`${x},${y}`];
    if (idx === undefined || boardState.arrowMap[idx].removed) return;

    const a = boardState.arrowMap[idx];
    const head = a.waypoints[a.waypoints.length - 1];
    if (!isPathClear(head, a.headDirection, boardState.gx, boardState.gy, boardState.cellMap)) {
      flashArrowFail(idx);
      return;
    }
    removeArrow(idx);
  }

  /**
   * Flash arrow fail.
   *
   * @param {number} idx - idx value.
   */
  function flashArrowFail(idx) {
    boardState.arrowMap[idx]?.waypoints?.forEach(wp => {
      const cell = $(`cell-${wp.x}-${wp.y}`);
      if (!cell) return;
      cell.classList.remove('flash-fail'); void cell.offsetWidth; cell.classList.add('flash-fail');
      setTimeout(() => cell.classList.remove('flash-fail'), 500);
    });
  }

  /**
   * Remove arrow.
   *
   * @param {number} idx - idx value.
   */
  function removeArrow(idx) {
    const a = boardState.arrowMap[idx];
    a.removed = true;
    a.waypoints.forEach(wp => { delete boardState.cellMap[`${wp.x},${wp.y}`]; });
    boardState.remaining--;

    const removed = boardState.total - boardState.remaining;
    $('solve-step').textContent = `${removed} / ${boardState.total}`;

    a.waypoints.forEach(wp => {
      const cell = $(`cell-${wp.x}-${wp.y}`);
      if (!cell) return;
      cell.removeEventListener('click', onCellClick);
      cell.classList.add('flash-remove');
      setTimeout(() => { cell.className = 'cell empty'; cell.style.cssText = ''; cell.innerHTML = ''; }, 350);
    });

    if (boardState.remaining === 0) {
      $('status-msg').textContent = '✓ Solved!';
      stopSolve();
    }
  }

  // ── Path-clear check (mirrors server logic) ───────────────────────────────
  /**
   * Check whether path clear.
   *
   * @param {Object} head - head value.
   * @param {string} dir - dir value.
   * @param {number} gx - gx value.
   * @param {number} gy - gy value.
   * @param {Object} cellMap - cell map value.
   * @returns {boolean} Whether the condition is met.
   */
  function isPathClear(head, dir, gx, gy, cellMap) {
    const d = DIR_DELTA[dir];
    if (!d) return false;
    let x = head.x + d.dx, y = head.y + d.dy;
    while (x >= 0 && x < gx && y >= 0 && y < gy) {
      if (cellMap[`${x},${y}`] !== undefined) return false;
      x += d.dx; y += d.dy;
    }
    return true;
  }

  // ── Solver ────────────────────────────────────────────────────────────────
  let solveTimer = null;
  /**
   * Get solve delay.
   *
   * @returns {number} The numeric value.
   */
  const getSolveDelay = () => Math.max(10, parseInt($('solve-interval').value, 10) || 120);

  /**
   * Stop solve.
   */
  function stopSolve() {
    solving = false;
    clearTimeout(solveTimer);
    solveTimer = null;
    $('btn-solve').textContent = 'Solve';
    $('btn-solve').classList.remove('solving');
    $('solve-interval').disabled = false;
  }

  $('btn-solve').addEventListener('click', () => {
    if (!boardState) return;
    if (solving) { stopSolve(); return; }
    if (boardState.remaining === 0) {
      $('status-msg').textContent = 'Board already solved!';
      return;
    }
    solving = true;
    $('btn-solve').textContent = 'Stop';
    $('btn-solve').classList.add('solving');
    $('solve-interval').disabled = true;
    $('status-msg').textContent = 'Solving…';
    scheduleNextRemoval();
  });

  /**
   * Handle schedule next removal.
   */
  function scheduleNextRemoval() {
    solveTimer = setTimeout(removeNextArrow, getSolveDelay());
  }

  /**
   * Remove next arrow.
   */
  function removeNextArrow() {
    if (!solving || !boardState) return;

    const { gx, gy, arrowMap, cellMap } = boardState;

    // Find first removable arrow
    let found = null;
    for (const [idxStr, a] of Object.entries(arrowMap)) {
      if (a.removed) continue;
      const head = a.waypoints[a.waypoints.length - 1];
      if (isPathClear(head, a.headDirection, gx, gy, cellMap)) {
        found = { idx: +idxStr, a };
        break;
      }
    }

    if (!found) {
      // No removable arrow — board is unsolvable from current state (shouldn't happen for generated boards)
      $('status-msg').textContent = '✗ Stuck — no removable arrow found';
      stopSolve();
      return;
    }

    // Green flash on the head cell, then remove after a brief pause
    const head = found.a.waypoints[found.a.waypoints.length - 1];
    const headCell = $(`cell-${head.x}-${head.y}`);
    if (headCell) {
      headCell.classList.add('autoplay-flash');
      setTimeout(() => headCell.classList.remove('autoplay-flash'), 200);
    }

    removeArrow(found.idx);

    if (solving && boardState && boardState.remaining > 0) scheduleNextRemoval();
  }

  $('btn-clear-log').addEventListener('click', () => { $('log').innerHTML = ''; });

  window.addEventListener('DOMContentLoaded', () => {
    $('arrows-url').value = window.location.origin;
  });
</script>
</body>
</html>
