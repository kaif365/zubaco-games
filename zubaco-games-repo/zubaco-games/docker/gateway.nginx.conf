# ╔══════════════════════════════════════════════════════════════╗
# ║  Zubaco Games – API Gateway / Reverse Proxy                 ║
# ╚══════════════════════════════════════════════════════════════╝
# Routes all game traffic through a single entry point.
# Each game gets /game/<slug> → frontend, /api/v1/<slug> → backend

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ───
    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"x_correlation_id":"$http_x_correlation_id"'
    '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ───
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 2m;
    server_tokens off;

    # ─── Gzip ───
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ─── Rate limiting zones ───
    limit_req_zone $binary_remote_addr zone=api_global:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_burst:10m rate=100r/s;

    # ─── Upstreams ───
    upstream colour_sorting_be        { server colour-sorting-backend:3006;       }
    upstream flash_spot_be            { server flash-spot-backend:3001;           }
    upstream object_placement_be      { server object-placement-backend:3004;     }
    upstream rapid_sort_be            { server rapid-sort-backend:3008;           }
    upstream true_false_blitz_be      { server true-false-blitz-backend:3010;     }
    upstream word_unscramble_be       { server word-unscramble-backend:3012;      }
    upstream number_grid_be           { server number-grid-backend:3014;          }
    upstream live_route_be            { server live-route-backend:3016;           }
    upstream memory_groups_be         { server memory-groups-backend:3018;        }
    upstream reflex_endurance_be      { server reflex-endurance-backend:3020;     }
    upstream pattern_survival_be      { server pattern-survival-backend:3022;     }
    upstream speed_type_be            { server speed-type-backend:3024;           }
    upstream sequence_recall_be       { server sequence-recall-backend:3026;      }
    upstream memory_card_matching_be  { server memory-card-matching-backend:3028; }
    upstream sliding_puzzle_be        { server sliding-puzzle-backend:3030;       }
    upstream block_fill_be            { server block-fill-backend:3032;           }
    upstream maze_navigation_be       { server maze-navigation-backend:3034;      }
    upstream infinity_loop_be         { server infinity-loop-backend:3036;        }
    upstream arrows_be                { server arrows-backend:3038;               }
    upstream logic_reflector_be       { server logic-reflector-backend:3040;      }

    upstream colour_sorting_fe      { server colour-sorting-frontend:80;      }
    upstream flash_spot_fe          { server flash-spot-frontend:80;          }
    upstream object_placement_fe    { server object-placement-frontend:80;    }
    upstream rapid_sort_fe          { server rapid-sort-frontend:80;          }
    upstream true_false_blitz_fe    { server true-false-blitz-frontend:80;    }
    upstream word_unscramble_fe     { server word-unscramble-frontend:80;     }
    upstream number_grid_fe         { server number-grid-frontend:80;         }
    upstream live_route_fe          { server live-route-frontend:80;          }
    upstream memory_groups_fe       { server memory-groups-frontend:80;       }
    upstream reflex_endurance_fe    { server reflex-endurance-frontend:80;    }
    upstream pattern_survival_fe    { server pattern-survival-frontend:80;    }
    upstream speed_type_fe          { server speed-type-frontend:80;          }
    upstream sequence_recall_fe     { server sequence-recall-frontend:80;     }
    upstream memory_card_matching_fe{ server memory-card-matching-frontend:80;}
    upstream sliding_puzzle_fe      { server sliding-puzzle-frontend:80;      }
    upstream block_fill_fe          { server block-fill-frontend:80;          }
    upstream maze_navigation_fe     { server maze-navigation-frontend:80;     }
    upstream infinity_loop_fe       { server infinity-loop-frontend:80;       }
    upstream arrows_fe              { server arrows-frontend:80;              }
    upstream logic_reflector_fe     { server logic-reflector-frontend:80;     }

    server {
        listen 80;
        server_name _;

        # ─── Security headers ───
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ─── Health check ───
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }

        # ═══ API routes (backend proxies) ═══
        location /api/v1/colour-sorting/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://colour_sorting_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/flash-spot/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://flash_spot_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/object-placement/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://object_placement_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/rapid-sort/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://rapid_sort_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/true-false-blitz/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://true_false_blitz_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/word-unscramble/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://word_unscramble_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/number-grid/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://number_grid_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/live-route/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://live_route_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/memory-groups/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://memory_groups_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/reflex-endurance/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://reflex_endurance_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/pattern-survival/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://pattern_survival_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/speed-type/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://speed_type_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/sequence-recall/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://sequence_recall_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/memory-card-matching/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://memory_card_matching_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/sliding-puzzle/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://sliding_puzzle_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/block-fill/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://block_fill_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/maze-navigation/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://maze_navigation_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/infinity-loop/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://infinity_loop_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/arrows/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://arrows_be/api/v1/;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/logic-reflector/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass http://logic_reflector_be/api/v1/;
            include /etc/nginx/proxy_params;
        }

        # ═══ Frontend routes (SPA proxies) ═══
        location /game/colour-sorting/ {
            proxy_pass http://colour_sorting_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/flash-spot/ {
            proxy_pass http://flash_spot_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/object-placement/ {
            proxy_pass http://object_placement_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/rapid-sort/ {
            proxy_pass http://rapid_sort_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/true-false-blitz/ {
            proxy_pass http://true_false_blitz_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/word-unscramble/ {
            proxy_pass http://word_unscramble_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/number-grid/ {
            proxy_pass http://number_grid_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/live-route/ {
            proxy_pass http://live_route_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/memory-groups/ {
            proxy_pass http://memory_groups_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/reflex-endurance/ {
            proxy_pass http://reflex_endurance_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/pattern-survival/ {
            proxy_pass http://pattern_survival_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/speed-type/ {
            proxy_pass http://speed_type_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/sequence-recall/ {
            proxy_pass http://sequence_recall_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/memory-card-matching/ {
            proxy_pass http://memory_card_matching_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/sliding-puzzle/ {
            proxy_pass http://sliding_puzzle_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/block-fill/ {
            proxy_pass http://block_fill_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/maze-navigation/ {
            proxy_pass http://maze_navigation_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/infinity-loop/ {
            proxy_pass http://infinity_loop_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/arrows/ {
            proxy_pass http://arrows_fe/;
            include /etc/nginx/proxy_params;
        }
        location /game/logic-reflector/ {
            proxy_pass http://logic_reflector_fe/;
            include /etc/nginx/proxy_params;
        }

        # ─── Default: 404 ───
        location / {
            return 404 '{"error":"Not Found","message":"Use /game/<slug> or /api/v1/<slug>"}';
            add_header Content-Type application/json;
        }
    }
}
